spring.profiles.active=h2
spring.application.name=backend
# JWT config
zycus.core.jwtSecret=${JWT_SECRET}
zycus.core.jwtExpirationMs=86400000

server.port = 8080

spring.datasource.url=jdbc:mysql://localhost:3306/zycus_hackathon
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
management.endpoints.web.exposure.include=health

# Set the maximum file size to 2MB
spring.servlet.multipart.max-file-size=2MB

mcp-server.url=http://localhost:8082

spring.session.store-type=none
spring.data.redis.host=localhost
spring.data.redis.port=6380
spring.data.redis.timeout=60000

# SMTP server config (example with Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=codewithsakship9@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

openai.api.key=${OPENAI_API_KEY}
openai.model=gpt-4o-mini
